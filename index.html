    <script type="module">
      const verificationToken = import.meta.env.VITE_GSC_VERIFICATION || "";
      if (verificationToken) {
        const verificationMeta = document.createElement("meta");
        verificationMeta.name = "google-site-verification";
        verificationMeta.content = verificationToken;
        document.head.appendChild(verificationMeta);
      }

      const measurementId = import.meta.env.VITE_FIREBASE_MEASUREMENT_ID || "";
      if (measurementId && measurementId !== "G-XXXXXXXXXX") {
        const gtagScript = document.createElement("script");
        gtagScript.async = true;
        gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=" + measurementId;
        document.head.appendChild(gtagScript);

        window.dataLayer = window.dataLayer || [];
        function gtag() {
          window.dataLayer.push(arguments);
        }
        gtag("js", new Date());
        gtag("config", measurementId);
        window.gtag = gtag;
      }
    </script>
